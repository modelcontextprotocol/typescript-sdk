# lefthook.yml
# Configuration reference: https://lefthook.dev/configuration/

assert_lefthook_installed: true

output:
    - meta # Print lefthook version
    - summary # Print summary block (successful and failed steps)
    - empty_summary # Print summary heading when there are no steps to run
    - success # Print successful steps
    - failure # Print failed steps printing
    - execution # Print any execution logs (but prints if the execution failed)
    - execution_out # Print execution output (but still prints failed commands output)
    - execution_info # Print `EXECUTE > ...` logging
    - skips # Print "skip" (i.e. no files matched)

pre-push:
    follow: true
    parallel: true
    jobs:
        - name: 'Lockfile registry guard'
          run: |
              if grep -qE 'artifactory|\.svc\.cluster\.local' pnpm-lock.yaml; then
                  echo ''
                  echo 'ERROR: pnpm-lock.yaml contains a non-public registry URL.'
                  echo 'A locally-configured scoped registry override has leaked into the lockfile.'
                  echo 'The repo .npmrc pins all scopes to registry.npmjs.org — re-run `pnpm install`'
                  echo 'from a clean shell (or remove the scoped override from your ~/.npmrc) and'
                  echo 'verify the lockfile no longer references a private registry.'
                  exit 1
              fi

        - name: 'Typecheck'
          run: pnpm run typecheck:all
          fail_text: |
              💡 To catch typechecking issues earlier, enable the pre-commit hook:
              cp lefthook-local.example.yml lefthook-local.yml

        - name: 'Lint'
          run: pnpm run lint:all
          fail_text: |
              💡 To catch linting issues earlier, enable the pre-commit hook:
              cp lefthook-local.example.yml lefthook-local.yml

        - name: 'Build'
          run: pnpm run build:all
          fail_text: |
              💡 To catch build issues earlier, enable the pre-commit hook:
              cp lefthook-local.example.yml lefthook-local.yml
